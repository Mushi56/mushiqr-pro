<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MushiQR Pro</title>
    <style>
      body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #030305; /* Match --bg-primary */
        font-family: 'Inter', -apple-system, sans-serif;
      }
      #initial-loader {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background-color: #030305; z-index: 99999;
      }
      .loader-brand {
        font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 24px; letter-spacing: -0.5px;
        background: linear-gradient(135deg, #00F0FF 0%, #7000FF 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }
      .spinner {
        width: 40px; height: 40px; border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%; border-top-color: #00F0FF;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-brand">MushiQR Pro</div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
