<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#13131D" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MushiQR Pro</title>
    <style>
      body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #030305; /* Match --bg-primary */
        font-family: 'Inter', -apple-system, sans-serif;
      }
      #initial-loader {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background-color: #030305; z-index: 999999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .loader-logo {
        width: 100px; height: 100px; object-fit: contain; margin-bottom: 24px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        filter: drop-shadow(0 0 30px rgba(214, 0, 54, 0.3));
        border-radius: 22%; /* iPhone squircle */
      }
      .loader-brand {
        font-family: 'Outfit', sans-serif;
        font-size: 32px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 32px;
        letter-spacing: -1px;
      }
      .loader-brand span {
        font-weight: 500;
        background: linear-gradient(135deg, #D60036 0%, #FF007F 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .spinner {
        width: 42px; height: 42px; border: 3px solid rgba(214, 0, 54, 0.1);
        border-radius: 50%; border-top-color: #D60036;
        animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 50% { transform: scale(1.05); } }
    </style>
  </head>
  <body>
    <!-- Persistent Splash Screen -->
    <div id="initial-loader">
      <img src="/logo.png" alt="App Logo" class="loader-logo" />
      <div class="loader-brand">Mushi QR <span>Pro</span></div>
      <div class="spinner"></div>
    </div>

    <!-- React App Container -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Splash Screen Logic -->
    <script>
      // Wait for everything to load, then wait an extra 2 seconds for a premium feel
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('initial-loader');
          if (splash) {
            splash.style.opacity = '0';
            splash.style.pointerEvents = 'none'; // Instantly allow clicks underneath
            // Remove from DOM after fade transition completes
            setTimeout(() => splash.remove(), 600);
          }
        }, 1000); // 1000ms delay
      });
    </script>
  </body>
</html>
