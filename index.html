<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MushiQR Pro</title>
    <style>
      body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #030305; /* Match --bg-primary */
        font-family: 'Inter', -apple-system, sans-serif;
      }
      #initial-loader {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background-color: #030305; z-index: 999999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .loader-logo {
        width: 100px; height: 100px; object-fit: contain; margin-bottom: 24px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.4));
      }
      .loader-brand {
        font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 32px; letter-spacing: -0.5px;
        background: linear-gradient(135deg, #00F0FF 0%, #7000FF 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }
      .spinner {
        width: 48px; height: 48px; border: 4px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%; border-top-color: #00F0FF; border-bottom-color: #7000FF;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 50% { transform: scale(1.05); } }
    </style>
  </head>
  <body>
    <!-- Persistent Splash Screen -->
    <div id="initial-loader">
      <img src="/logo.png" alt="App Logo" class="loader-logo" />
      <div class="loader-brand">MushiQR Pro</div>
      <div class="spinner"></div>
    </div>

    <!-- React App Container -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Splash Screen Logic -->
    <script>
      // Wait for everything to load, then wait an extra 2 seconds for a premium feel
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('initial-loader');
          if (splash) {
            splash.style.opacity = '0';
            splash.style.pointerEvents = 'none'; // Instantly allow clicks underneath
            // Remove from DOM after fade transition completes
            setTimeout(() => splash.remove(), 600);
          }
        }, 2000); // 2000ms delay
      });
    </script>
  </body>
</html>
