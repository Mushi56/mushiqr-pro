<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <!-- Red gradient for the ribbon -->
    <linearGradient id="ribbon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D6A"/>
      <stop offset="50%" stop-color="#D60036"/>
      <stop offset="100%" stop-color="#8A0020"/>
    </linearGradient>
    
    <!-- Red gradient for the PRO badge -->
    <linearGradient id="pro-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D60036"/>
      <stop offset="100%" stop-color="#8A0020"/>
    </linearGradient>

    <!-- Glow effect for the ribbon -->
    <filter id="ribbon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- QR Code Pattern Modules (White) -->
  <g fill="#FFFFFF" opacity="0.9">
    <!-- Top-Left Finder -->
    <rect x="40" y="40" width="120" height="120" rx="15"/>
    <rect x="58" y="58" width="84" height="84" rx="8" fill="none" stroke="#FFFFFF" stroke-width="12"/>
    <rect x="80" y="80" width="40" height="40" rx="4"/>

    <!-- Top-Right Finder -->
    <rect x="352" y="40" width="120" height="120" rx="15"/>
    <rect x="370" y="58" width="84" height="84" rx="8" fill="none" stroke="#FFFFFF" stroke-width="12"/>
    <rect x="392" y="80" width="40" height="40" rx="4"/>

    <!-- Bottom-Left Finder -->
    <rect x="40" y="352" width="120" height="120" rx="15"/>
    <rect x="58" y="370" width="84" height="84" rx="8" fill="none" stroke="#FFFFFF" stroke-width="12"/>
    <rect x="80" y="392" width="40" height="40" rx="4"/>

    <!-- Data Modules (Scatter) -->
    <rect x="180" y="40" width="24" height="24" rx="4"/>
    <rect x="220" y="40" width="24" height="24" rx="4"/>
    <rect x="260" y="40" width="24" height="24" rx="4"/>
    <rect x="300" y="40" width="24" height="24" rx="4"/>
    
    <rect x="180" y="80" width="24" height="24" rx="4"/>
    <rect x="260" y="80" width="24" height="24" rx="4"/>
    
    <rect x="180" y="120" width="24" height="24" rx="4"/>
    <rect x="220" y="120" width="24" height="24" rx="4"/>
    <rect x="300" y="120" width="24" height="24" rx="4"/>

    <rect x="40" y="180" width="24" height="24" rx="4"/>
    <rect x="40" y="220" width="24" height="24" rx="4"/>
    <rect x="40" y="260" width="24" height="24" rx="4"/>
    <rect x="40" y="300" width="24" height="24" rx="4"/>

    <rect x="352" y="180" width="24" height="24" rx="4"/>
    <rect x="352" y="220" width="24" height="24" rx="4"/>
    <rect x="352" y="260" width="24" height="24" rx="4"/>
    <rect x="352" y="300" width="24" height="24" rx="4"/>

    <rect x="448" y="180" width="24" height="24" rx="4"/>
    <rect x="448" y="220" width="24" height="24" rx="4"/>
    <rect x="448" y="260" width="24" height="24" rx="4"/>
    <rect x="448" y="300" width="24" height="24" rx="4"/>

    <rect x="180" y="352" width="24" height="24" rx="4"/>
    <rect x="180" y="392" width="24" height="24" rx="4"/>
    <rect x="180" y="432" width="24" height="24" rx="4"/>

    <rect x="260" y="352" width="24" height="24" rx="4"/>
    <rect x="260" y="432" width="24" height="24" rx="4"/>
    
    <rect x="300" y="392" width="24" height="24" rx="4"/>
    <rect x="300" y="448" width="24" height="24" rx="4"/>
  </g>

  <!-- Flowing Ribbon "M" (Recolored and styled) -->
  <path d="M 0,280 
           C 100,280 120,120 180,120 
           C 240,120 250,340 300,180 
           C 350,20 400,280 512,280" 
        stroke="url(#ribbon-grad)" 
        stroke-width="50" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" 
        filter="url(#ribbon-glow)"/>

  <!-- Secondary path for ribbon highlights -->
  <path d="M 0,280 
           C 100,280 120,120 180,120 
           C 240,120 250,340 300,180 
           C 350,20 400,280 512,280" 
        stroke="rgba(255,255,255,0.2)" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"
        transform="translate(0, -5)"/>

  <!-- Big white "M" letter (optional, depends on how stylized ribbon is) -->
  <text x="140" y="400" font-family="Arial, sans-serif" font-weight="bold" font-size="280" fill="#FFFFFF" opacity="0.95" style="filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.5))">M</text>

  <!-- PRO Badge (Bottom Right) -->
  <rect x="340" y="420" width="140" height="60" rx="30" fill="url(#pro-grad)"/>
  <text x="410" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="32" fill="#FFFFFF" letter-spacing="4">PRO</text>
</svg>
